server {
    listen 80;
    server_name localhost;

    # DNS sẽ được Dockerfile tự động cấu hình lúc khởi chạy
    include /etc/nginx/conf.d/resolver.conf;
    set $backend_host "document-sharing-backend";

    # API Gateway: Điều hướng sang Backend nội bộ của Render
    location /api/ {
        proxy_pass http://$backend_host:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Phục vụ Frontend tĩnh
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Tối ưu hóa hiệu năng: Nén Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
