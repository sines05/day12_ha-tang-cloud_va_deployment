services:
  frontend:
    build:
      context: ./vnu
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    ports:
      - "8080:80"
    restart: always
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./exam-worker
      dockerfile: Dockerfile
    restart: always
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/universities').then(r => r.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    env_file:
      - ./exam-worker/.dev.vars
